<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/user/base::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>

</head>

<body>


	<section>

		<div class="container p-5">
			<div class="row">
				<div class="col-md-6 offset-md-3">
					<div class="card">
						<div class="card-header text-center fs-4">Forgot Password</div>
						<th:block th:if="${session.msg}">
							<p class="text-center fs-4 text-success" th:text="${session.msg}"></p>
						</th:block>
						<div class="card-body">

							<form action="/admin/user/forgot-password" method="post">

								<div class="mb-3">
									<label>Enter Email</label> <input type="text" name="email" class="form-control">
								</div>


								<div class="mb-3">
									<label>Enter Phone</label> <input type="text" name="mobileNum" class="form-control">
								</div>
								<button class="btn btn-primary col-md-12">Reset Password</button>
							</form>

						</div>
					</div>
				</div>
			</div>

		</div>



	</section>


</body>

</html>
