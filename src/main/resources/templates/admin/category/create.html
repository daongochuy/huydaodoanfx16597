<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="admin/layout::adminlayout(~{::th:block})">

<body>
	<th:block>
		<div style="width: 69%;">
			<h2 class="mb-3" style="text-align: center;">Thêm / Cập nhật danh mục</h2>

			<form th:action="@{'/admin/categories/save'}" th:object="${category}" method="post">
				<div class="form-group row">
					<label class="col-sm-3 col-form-label">Tên danh mục</label>
					<div class="col-sm-9">
						<input type="text" class="form-control" name="name" th:field="*{name}"
							placeholder="Nhập tên danh mục">
					</div>
				</div>

				<div class="form-group row">
					<label class="col-sm-3 col-form-label">Loại</label>
					<div class="col-sm-9">
						<select class="form-control" th:field="*{type}">
							<option value="">-- Chọn loại --</option>
							<option value="du_hoc">Du học</option>
							<option value="xuat_khau_lao_dong">Xuất khẩu lao động</option>
							<option value="ky_su">Kỹ sư</option>
							<option value="khoa_hoc">Khóa học</option>
						</select>
					</div>
				</div>

				<div class="form-group row">
					<label class="col-sm-3 col-form-label">Trạng thái</label>
					<div class="col-sm-9">
						<select class="form-control" name="status" th:field="*{status}">
							<option value="">-- Chọn trạng thái --</option>
							<option value="ACTIVE">Hoạt động</option>
							<option value="INACTIVE">Tạm ẩn</option>
						</select>
					</div>
				</div>

				<div class="form-group row">
					<label class="col-sm-3 col-form-label">Mô tả</label>
					<div class="col-sm-9">
						<textarea class="form-control" name="description" th:field="*{description}" rows="3"
							placeholder="Nhập mô tả danh mục"></textarea>
					</div>
				</div>

				<div class="form-group row">
					<div class="col-sm-9 offset-sm-3">
						<button type="submit" class="btn btn-primary">Lưu danh mục</button>
					</div>
				</div>
			</form>
		</div>

	</th:block>
</body>

</html>
