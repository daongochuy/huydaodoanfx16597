<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout::adminlayout(~{::th:block})}">

<body>
<th:block>

<div style="width: 69%;">
    <h2 class="mb-3" style="text-align: center;">Thêm / Cập nhật bài viết</h2>

    <form th:action="@{'/admin/posts/save'}"
          th:object="${post}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{thumbnail}">

        <div class="form-group row">
            <label class="col-sm-3 col-form-label">Tiêu đề</label>
            <div class="col-sm-9">
                <input type="text"
                       class="form-control"
                       th:field="*{title}"
                       placeholder="Nhập tiêu đề bài viết">
            </div>
        </div>

        <div class="form-group row">
            <label class="col-sm-3 col-form-label">Danh mục</label>
            <div class="col-sm-9">
                <select class="form-control" th:field="*{category}">
                    <option value="">-- Chọn danh mục --</option>
                    <option value="tin_tuc">Tin tức</option>
                    <option value="gioi_thieu">Giới thiệu</option>
                    <option value="thong_bao">Thông báo</option>
                    <option value="huong_dan">Hướng dẫn</option>
                </select>
            </div>
        </div>

        <!-- Thumbnail -->
        <div class="form-group row">
            <label class="col-sm-3 col-form-label">Thumbnail</label>

            <div class="col-sm-9">

                <input type="file"
                       class="form-control"
                       name="thumbnailFile"
                       accept="image/*"
                       onchange="previewImage(event)">

                <!-- hiển thị ảnh cũ khi edit -->
                <div th:if="${post.thumbnail != null}" style="margin-top:10px;">
                    <p style="margin-bottom:5px;">Ảnh hiện tại:</p>
                    <img th:src="@{${post.thumbnail}}"
                         id="preview"
                         style="max-width:200px;border-radius:6px;">
                </div>

                <!-- preview khi chọn ảnh mới -->
                <img id="preview"
                     th:if="${post.thumbnail == null}"
                     style="margin-top:10px; max-width:200px; display:none; border-radius:6px;" />

            </div>
        </div>

        <div class="form-group row">
            <label class="col-sm-3 col-form-label">Trạng thái</label>
            <div class="col-sm-9">
                <select class="form-control" th:field="*{enable}">
                    <option value="true">Hiển thị</option>
                    <option value="false">Ẩn</option>
                </select>
            </div>
        </div>

        <div class="form-group row">
            <label class="col-sm-3 col-form-label">Nội dung</label>

            <div class="col-sm-9">
                <textarea class="form-control"
                          th:field="*{content}"
                          id="editor"
                          rows="10"></textarea>
            </div>
        </div>

        <div class="form-group row">
            <div class="col-sm-9 offset-sm-3">
                <button type="submit" class="btn btn-primary">
                    Lưu bài viết
                </button>
            </div>
        </div>

    </form>
</div>

<script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>

<script>
    CKEDITOR.replace('editor', {
        height: 400
    });
</script>

<script>
function previewImage(event) {

    const file = event.target.files[0];

    if (file) {

        const reader = new FileReader();

        reader.onload = function(e) {

            const preview = document.getElementById("preview");

            preview.src = e.target.result;
            preview.style.display = "block";
        }

        reader.readAsDataURL(file);
    }
}
</script>

</th:block>
</body>
</html>
