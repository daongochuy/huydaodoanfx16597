<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout::adminlayout(~{::th:block})}">

<body>
<th:block>

<h3>Thêm ảnh chương trình</h3>

<form th:action="@{/admin/program-images/save}"
      method="post"
      th:object="${programImage}"
      enctype="multipart/form-data">

    <!-- Khung hiển thị preview -->
    <div class="mb-3">
        <label class="form-label">Ảnh</label><br>

        <div style="width:250px; height:180px; border:2px dashed #ccc; 
                    display:flex; align-items:center; justify-content:center;
                    overflow:hidden; border-radius:8px; background:#fafafa;">

            <!-- Ảnh preview -->
            <img id="imagePreview"
                 style="max-width:100%; max-height:100%; display:none;" />

            <!-- Placeholder -->
            <span id="placeholderText" style="color:#999;">
                Chưa chọn ảnh
            </span>

        </div>
    </div>

    <!-- Chọn ảnh -->
    <div class="mb-3">
        <label class="form-label">Chọn ảnh</label>
        <input type="file"
               name="imagefile"
               class="form-control"
               accept="image/*"
               onchange="previewImage(event)"
               required>
    </div>

    <!-- Chọn chương trình -->
    <div class="mb-3 col-md-6">
        <label class="form-label">Chọn chương trình</label>
        <select th:field="*{program.id}"
                class="form-select"
                required>

            <option value="">-- Chọn chương trình --</option>

            <option th:each="c : ${programs}"
                    th:value="${c.id}"
                    th:text="${c.title}">
            </option>

        </select>
    </div>

    <!-- Thumbnail -->
    <div class="mb-3 form-check">
        <input type="checkbox"
               class="form-check-input"
               th:field="*{isThumbnail}">
        <label class="form-check-label">
            Ảnh đại diện (thumbnail)
        </label>
    </div>

    <!-- Nút -->
    <div class="mt-3">
        <button type="submit" class="btn btn-primary">
            Thêm ảnh
        </button>

        <a th:href="@{/admin/program-images/list}"
           class="btn btn-secondary">
            Hủy
        </a>
    </div>

</form>

<!-- Script preview -->
<script>
function previewImage(event) {
    const preview = document.getElementById("imagePreview");
    const placeholder = document.getElementById("placeholderText");
    const file = event.target.files[0];

    if (file) {
        const reader = new FileReader();

        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = "block";
            placeholder.style.display = "none";
        }

        reader.readAsDataURL(file);
    }
}
</script>

</th:block>
</body>
</html>
